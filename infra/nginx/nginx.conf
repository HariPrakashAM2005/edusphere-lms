user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=16k flush=2m;

    # ─── Performance ─────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # ─── Compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml image/svg+xml
        font/woff font/woff2;

    # ─── Security Headers (global) ───────────────────────────
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Rate Limiting ───────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─── Upstream Services ───────────────────────────────────
    upstream backend_api {
        server backend:3001;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:3000;
        keepalive 16;
    }

    upstream admin_panel {
        server admin:3002;
        keepalive 16;
    }

    upstream adminer_db {
        server adminer:8080;
    }

    # ─── HTTP → HTTPS Redirect ───────────────────────────────
    server {
        listen 80;
        server_name edusphere.com www.edusphere.com api.edusphere.com admin.edusphere.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── Student Frontend ─────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name edusphere.com www.edusphere.com;

        ssl_certificate     /etc/nginx/ssl/edusphere.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/edusphere.com/privkey.pem;
        ssl_dhparam         /etc/nginx/dhparam.pem;
        include /etc/nginx/snippets/ssl-params.conf;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'" always;

        # Static assets with long-term caching
        location /_next/static/ {
            proxy_pass http://frontend_app;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /public/ {
            proxy_pass http://frontend_app;
            add_header Cache-Control "public, max-age=86400";
        }

        location / {
            limit_conn conn_limit 50;
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }
    }

    # ─── Backend API ─────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.edusphere.com;

        ssl_certificate     /etc/nginx/ssl/api.edusphere.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/api.edusphere.com/privkey.pem;
        ssl_dhparam         /etc/nginx/dhparam.pem;
        include /etc/nginx/snippets/ssl-params.conf;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        client_max_body_size 50M;

        # Auth endpoints – stricter rate limiting
        location ~ ^/api/auth/(login|register|refresh) {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://backend_api;
            include /etc/nginx/snippets/proxy-params.conf;
        }

        # WebSocket (Socket.io)
        location /socket.io/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # All other API routes
        location / {
            limit_req zone=api burst=50 nodelay;
            limit_conn conn_limit 30;
            proxy_pass http://backend_api;
            include /etc/nginx/snippets/proxy-params.conf;
        }
    }

    # ─── Admin Panel ─────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name admin.edusphere.com;

        ssl_certificate     /etc/nginx/ssl/admin.edusphere.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/admin.edusphere.com/privkey.pem;
        ssl_dhparam         /etc/nginx/dhparam.pem;
        include /etc/nginx/snippets/ssl-params.conf;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Optional: restrict admin panel to specific IPs
        # allow 203.0.113.10;
        # deny all;

        location /_next/static/ {
            proxy_pass http://admin_panel;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            proxy_pass http://admin_panel;
            include /etc/nginx/snippets/proxy-params.conf;
        }
    }

    # ─── Adminer (IP-restricted) ──────────────────────────────
    server {
        listen 443 ssl http2;
        server_name db.edusphere.com;

        ssl_certificate     /etc/nginx/ssl/db.edusphere.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/db.edusphere.com/privkey.pem;
        ssl_dhparam         /etc/nginx/dhparam.pem;
        include /etc/nginx/snippets/ssl-params.conf;

        # STRICT IP allowlist – add your admin IPs here
        allow 203.0.113.10;
        allow 203.0.113.20;
        deny all;

        location / {
            proxy_pass http://adminer_db;
            include /etc/nginx/snippets/proxy-params.conf;
        }
    }
}
