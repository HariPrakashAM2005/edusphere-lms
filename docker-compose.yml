version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: edusphere-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: edusphere
      MYSQL_USER: edusphere
      MYSQL_PASSWORD: edusphere123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  redis:
    image: redis:7.2-alpine
    container_name: edusphere-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
  adminer:
    image: adminer:latest
    container_name: edusphere-adminer
    ports:
      - "8080:8080"
volumes:
  mysql_data:
